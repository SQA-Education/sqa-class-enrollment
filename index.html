<!DOCTYPE html>
<html lang="en" translate="no">
<head>

<meta charset="UTF-8">
<meta name="google" content="notranslate">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SQA English Level Discovery</title>

<style>

body{
font-family:Arial, sans-serif;
background:#1a1a3e;
color:white;
display:flex;
align-items:center;
justify-content:center;
height:100vh;
margin:0;
}

.container{
background:white;
color:#333;
padding:30px;
border-radius:12px;
width:600px;
max-width:95%;
}

button{
background:#F5A623;
border:none;
padding:12px 18px;
font-size:16px;
border-radius:6px;
cursor:pointer;
}

.chat{
margin-top:20px;
height:250px;
overflow:auto;
border:1px solid #ddd;
padding:10px;
border-radius:6px;
}

.student{color:#444;margin-top:10px}
.ai{color:#5B5091;margin-top:10px}

</style>

</head>

<body>

<div class="container">

<h2>SQA English Level Discovery</h2>

<button onclick="startTest()">Start Placement Test</button>

<div class="chat" id="chat"></div>

<div style="margin-top:15px">
<button onclick="startRecording()">🎤 Speak</button>
</div>

</div>

<script>

const ORAL_PROXY =
"https://script.google.com/macros/s/AKfycbw-BNRxesvKZNPW53iqnoc_Z7elS3QUlsv2Wuvg1krhuJVIWseI9d0pa_0gDns90TsYTw/exec";

const SECRET_TOKEN = "sqa-placement-2026-secure-94kL2";

let recognition;
let messages=[];

function addChat(role,text){

const chat=document.getElementById("chat");

const div=document.createElement("div");

div.className=role==="user"?"student":"ai";

div.innerText=(role==="user"?"Student: ":"Interviewer: ")+text;

chat.appendChild(div);

chat.scrollTop=chat.scrollHeight;

}

function speak(text){

const utter=new SpeechSynthesisUtterance(text);
utter.lang="en-US";

speechSynthesis.speak(utter);

}

async function askAI(){

const response=await fetch(ORAL_PROXY,{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
token:SECRET_TOKEN,
messages:messages
})
});

const data=await response.json();

const text=data.content[0].text;

messages.push({role:"assistant",content:text});

addChat("assistant",text);

speak(text);

}

function startTest(){

messages=[{
role:"system",
content:"You are a friendly English placement interviewer. Start with a simple A1 question."
}];

addChat("assistant","Hello! Let's start. What is your name?");

speak("Hello! Let's start. What is your name?");

}

function startRecording(){

if(!recognition){

recognition=new webkitSpeechRecognition();
recognition.lang="en-US";
recognition.continuous=false;

recognition.onresult=function(event){

const transcript=event.results[0][0].transcript;

addChat("user",transcript);

messages.push({role:"user",content:transcript});

askAI();

};

}

recognition.start();

}

</script>

</body>
</html>
